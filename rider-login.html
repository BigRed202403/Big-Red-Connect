<!-- =========================================================
     rider/login.html  (STABILITY UPDATE)
     - Friendlier wording
     - Links OneSignal external_id to riderId for ride-status pushes
     - FIXED: Continue button no longer hangs if OneSignal is slow/blocked
     - FIXED: Button shows progress and resets on errors
     ========================================================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Details – Big Red Connect</title>

  <link rel="apple-touch-icon" href="/official_logo.jpeg">
  <link rel="icon" type="image/png" sizes="192x192" href="/official_logo.jpeg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">

  <!-- 🔔 OneSignal Web Push SDK v16 -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.init({
          appId: "9b8bcc89-87d3-46e2-b2d0-042d1a267718",
          safari_web_id: "web.onesignal.auto.0c90051e-4735-447d-b203-75e3767d91b9",
          notifyButton: { enable: false },
          serviceWorkerPath: "/onesignalsdkworker.js?v=3",
          path: "/"
        });

        console.log("[Rider Login] OneSignal initialized.");
      } catch (e) {
        console.warn("[Rider Login] OneSignal init failed:", e);
      }
    });

    async function addRiderTagsSafe(OneSignal) {
      const tags = {
        env: "live",
        role_rider: "true",
        role_rider_live: "true"
      };

      if (OneSignal?.User?.addTags && typeof OneSignal.User.addTags === "function") {
        await OneSignal.User.addTags(tags);
        return;
      }

      if (OneSignal?.User?.addTag && typeof OneSignal.User.addTag === "function") {
        await OneSignal.User.addTag("env", "live");
        await OneSignal.User.addTag("role_rider", "true");
        await OneSignal.User.addTag("role_rider_live", "true");
        return;
      }

      if (typeof OneSignal.sendTag === "function") {
        await OneSignal.sendTag("env", "live");
        await OneSignal.sendTag("role_rider", "true");
        await OneSignal.sendTag("role_rider_live", "true");
      }
    }

    async function linkOneSignalToRider(riderId) {
      if (!riderId) return;

      try {
        window.OneSignalDeferred = window.OneSignalDeferred || [];

        OneSignalDeferred.push(async function(OneSignal) {
          try {
            await OneSignal.login(riderId);
            await addRiderTagsSafe(OneSignal);

            console.log("[Rider Login] OneSignal linked to riderId:", riderId);
          } catch (e) {
            console.warn("[Rider Login] OneSignal rider link failed:", e);
          }
        });
      } catch (e) {
        console.warn("[Rider Login] OneSignal link wrapper failed:", e);
      }
    }
  </script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding-bottom: 40px;
    }

    header {
      padding: 15px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #b30000;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    header img {
      height: 46px;
      cursor: pointer;
    }

    h1 {
      text-align: center;
      margin: 25px 10px 10px;
      font-size: 1.44rem;
      font-weight: 700;
    }

    .sub {
      text-align: center;
      margin: 0 16px 14px;
      color: #aaa;
      font-size: .95rem;
      line-height: 1.35;
    }

    .box {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      margin: 12px;
      padding: 18px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: .85rem;
      color: #bbb;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 1rem;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #000;
      color: #fff;
    }

    button {
      width: calc(100% - 24px);
      margin: 18px 12px 0 12px;
      padding: 14px;
      font-size: 1rem;
      text-align: center;
      background: #b30000;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 1px solid #b30000;
      padding: 12px 18px;
      border-radius: 999px;
      opacity: 0;
      transition: .25s;
      pointer-events: none;
      z-index: 50;
    }

    #toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
<header>
  <img src="/official_logo.jpeg" id="logoHome" alt="Big Red Connect">
  <div>
    <div style="font-weight:700;">Big Red Connect</div>
    <div style="color:#888;font-size:.8rem;">Quick Details</div>
  </div>
</header>

<h1>One Quick Step</h1>
<p class="sub">Add your name and number so Big Red knows who you are and can confirm your request.</p>

<div class="box">
  <label for="name">Your Name</label>
  <input id="name" placeholder="John Doe" autocomplete="name">

  <label for="phone">Mobile Number</label>
  <input id="phone" placeholder="405-555-1234" inputmode="tel" autocomplete="tel">
</div>

<button id="btnLogin" type="button">Continue</button>
<div id="toast"></div>

<script>
  const PROFILE_API  = "https://bigred-rider-profile.bigredtransportation.workers.dev";
  const BOOKINGS_API = "https://bigred-bookings.bigredtransportation.workers.dev";

  const qs = new URLSearchParams(location.search);
  const NEXT = (qs.get("next") || "").trim().toLowerCase();

  const NEXT_DROPOFF = (qs.get("dropoff") || "").trim();
  const NEXT_ADDRESS = (qs.get("address") || "").trim();
  const NEXT_RIDE_ID = (qs.get("id") || "").trim();

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
  }

  function resetButton() {
    const btn = document.getElementById("btnLogin");
    btn.disabled = false;
    btn.textContent = "Continue";
  }

  document.getElementById("logoHome").onclick = () => {
    location.href = "/index.html";
  };

  function stashDropoffHandoff(dest) {
    if (!dest) return;

    try {
      sessionStorage.setItem("brc_dropoff_handoff", dest);
    } catch (e) {}

    try {
      localStorage.setItem("brc_dropoff_handoff", dest);
    } catch (e) {}
  }

  async function claimManualRidesForThisPhone() {
    try {
      const riderId = localStorage.getItem("riderId") || "";
      const phoneRaw = localStorage.getItem("riderPhone") || "";
      const phone = phoneRaw.replace(/\D/g, "");
      const name = localStorage.getItem("riderName") || "";

      if (!riderId || !phone) return;

      const resp = await fetch(`${BOOKINGS_API}/api/rider/claim-rides`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          riderId,
          phone,
          riderName: name
        })
      });

      const txt = await resp.text();
      console.log("[claim-rides]", resp.status, txt);
    } catch (e) {
      console.warn("claim-rides failed", e);
    }
  }

  function redirectAfterLogin() {
    if (NEXT === "myride") {
      const url = NEXT_RIDE_ID
        ? "/rider/myride.html?id=" + encodeURIComponent(NEXT_RIDE_ID)
        : "/rider/myride.html";

      window.location.href = url;
      return;
    }

    if (NEXT === "ride-request") {
      if (NEXT_DROPOFF) stashDropoffHandoff(NEXT_DROPOFF);

      const url = NEXT_DROPOFF
        ? "/rider/ride-request.html?dropoff=" + encodeURIComponent(NEXT_DROPOFF)
        : "/rider/ride-request.html";

      window.location.href = url;
      return;
    }

    if (NEXT === "ride-from-search" && NEXT_ADDRESS) {
      stashDropoffHandoff(NEXT_ADDRESS);
      window.location.href = "/rider/ride-request.html?dropoff=" + encodeURIComponent(NEXT_ADDRESS);
      return;
    }

    if (NEXT === "profile") {
      window.location.href = "/rider/profile.html";
      return;
    }

    if (NEXT === "request") {
      window.location.href = "/rider/ride-request.html";
      return;
    }

    window.location.href = "/rider/rider.html";
  }

  document.getElementById("btnLogin").addEventListener("click", async () => {
    const btn = document.getElementById("btnLogin");

    btn.disabled = true;
    btn.textContent = "Continuing...";

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim().replace(/\D/g, "");

    if (!name || !phone) {
      resetButton();
      showToast("Name & phone required");
      return;
    }

    if (phone.length < 10) {
      resetButton();
      showToast("Invalid phone number");
      return;
    }

    try {
      const res = await fetch(`${PROFILE_API}/api/rider/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone })
      });

      if (!res.ok) {
        resetButton();
        showToast("Unable to continue");
        return;
      }

      const data = await res.json();
      const riderId = data.riderId;

      if (!riderId) {
        resetButton();
        showToast("Missing riderId");
        return;
      }

      const profile = {
        riderId,
        name,
        phone
      };

      localStorage.setItem("bigred_rider_profile_v1", JSON.stringify(profile));
      localStorage.setItem("riderId", riderId);
      localStorage.setItem("riderName", name);
      localStorage.setItem("riderPhone", phone);

      // Do not await this. OneSignal can be slow/blocked and should never stop login.
      linkOneSignalToRider(riderId).catch(() => {});

      await claimManualRidesForThisPhone();

      fetch(`${PROFILE_API}/api/rider/profile`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(profile)
      }).catch(() => {});

      redirectAfterLogin();

    } catch (err) {
      console.error(err);
      resetButton();
      showToast("Connection error");
    }
  });
</script>
</body>
</html>
